<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina AI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/style.css">
</head>

<body>
    <div class="app-layout">
        <header class="main-header">
            <div class="header-title">
                <span class="status-dot"></span>
                <h1><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-sparkles" style="color: #14f195; filter: drop-shadow(0 0 5px rgba(20,241,149,0.65)); display: inline-block; vertical-align: -2px; margin-right: 4px;"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="m5 3 1 2.5L8.5 6 6 7 5 9.5 4 7 1.5 6 4 5.5 5 3Z"/><path d="m19 17 1 2.5 2.5.5-2.5 1-1 2.5-1-2.5-2.5-1 2.5-1 1-2.5Z"/></svg>Lumina</h1>
            </div>
            <div class="header-actions">
                <button id="tts-btn" class="icon-btn" title="Vorlesen"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-volume-2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/></svg></button>
                <button id="export-btn" class="icon-btn" title="Chat exportieren"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-download"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg></button>
                <button id="theme-toggle" class="icon-btn" aria-label="Dark Mode"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-moon"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"/></svg></button>
            </div>
        </header>

        <div class="content-row">
            <aside class="calendar-section" id="calendar-panel">
                <div class="sidebar-tabs">
                    <button id="tab-calendar" class="tab-btn active"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-calendar" style="margin-right: 4px; vertical-align: -2px;"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>Kalender</button>
                    <button id="tab-notepad" class="tab-btn"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-notebook" style="margin-right: 4px; vertical-align: -2px;"><path d="M2 6h4"/><path d="M2 10h4"/><path d="M2 14h4"/><path d="M6 18H4a2 2 0 0 1-2-2v-2h4"/><path d="M6 22H4a2 2 0 0 1-2-2v-2h4"/><rect width="16" height="20" x="6" y="2" rx="2" ry="2"/><path d="M16 6H10"/><path d="M16 10H10"/><path d="M16 14H10"/></svg>Notizblock</button>
                </div>

                <div id="calendar-view" class="sidebar-view active-view">
                    <div class="cal-nav">
                        <button id="cal-prev" class="icon-btn" title="Vorheriger Monat"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-left"><path d="m15 18-6-6 6-6"/></svg></button>
                        <h3 id="cal-month">Monat</h3>
                        <button id="cal-next" class="icon-btn" title="Nächster Monat"><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-chevron-right"><path d="m9 18 6-6-6-6"/></svg></button>
                        <button id="cal-today" class="cal-today-btn">Heute</button>
                    </div>
                    <div class="cal-weekdays">
                        <span>Mo</span><span>Di</span><span>Mi</span><span>Do</span><span>Fr</span><span>Sa</span><span>So</span>
                    </div>
                    <div id="calendar-grid" class="cal-grid"></div>
                    <div id="next-event-widget" class="next-event-widget" style="display:none; margin-top: 10px;">
                        <div class="label">Nächster Termin</div>
                        <div id="next-event-name" class="event-name"></div>
                        <div id="next-event-time" class="event-time"></div>
                    </div>
                </div>

                <div id="notepad-view" class="sidebar-view hidden-view">
                    <div id="notes-list" class="notes-list">
                        <!-- Notizen werden hier dynamisch eingefügt -->
                    </div>
                    <div class="notes-input-area">
                        <input type="text" id="note-input" placeholder="Neue Notiz hinzufügen..." autocomplete="off">
                        <button id="add-note-btn" class="icon-btn" title="Notiz hinzufügen"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-plus"><path d="M5 12h14"/><path d="M12 5v14"/></svg></button>
                    </div>
                </div>
            </aside>
 
            <div class="resize-handle" id="resize-handle"></div>
 
            <main class="chat-section" id="chat-panel">
                <div id="chat-box" class="chat-box" role="log" aria-live="polite"></div>
                <footer class="input-area">
                    <input type="file" id="file-input" accept="image/*,.pdf" style="display: none;">
                    <button id="upload-btn" class="icon-btn" title="Datei hochladen (oder hierher ziehen)"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-paperclip"><path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
                    <div class="input-wrapper">
                        <input type="text" id="user-input" placeholder="Nachricht an Lumina..." autocomplete="off">
                        <button id="mic-btn" class="icon-btn" title="Spracheingabe starten"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-mic"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg></button>
                        <div id="cmd-dropdown" class="cmd-dropdown hidden"></div>
                    </div>
                    <button id="send-btn">Senden</button>
                </footer>
            </main>
        </div>
    </div>
 
    <div id="day-modal" class="modal hidden">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-date-title">Termine</h3>
                <button id="close-modal" class="icon-btn" title="Schließen"><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-x"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg></button>
            </div>
            <div id="modal-events-list" class="modal-body"></div>
        </div>
    </div>

    <div id="toast-container" class="toast-container"></div>

    <script src="/frontend/script.js"></script>
</body>

</html>
