<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina AI</title>
    <link rel="stylesheet" href="/frontend/style.css">
</head>

<body>
    <main class="chat-container">
        <header class="chat-header">
            <div class="header-title">
                <span class="status-dot"></span>
                <h1>Lumina</h1>
            </div>
            <button id="theme-toggle" class="icon-btn" aria-label="Dark Mode umschalten">🌗</button>
        </header>

        <section id="chat-box" class="chat-box" role="log" aria-live="polite"></section>

        <footer class="input-area">
            <input type="file" id="file-input" accept="image/*,.pdf" style="display: none;">
            <button id="upload-btn" class="icon-btn" title="Datei hochladen">📎</button>
            <input type="text" id="user-input" placeholder="Nachricht an Lumina..." autocomplete="off">
            <button id="send-btn">Senden</button>
        </footer>
    </main>

    <script src="/frontend/script.js"></script>
</body>

</html>
